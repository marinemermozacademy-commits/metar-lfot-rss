name: METAR LFOT update v4

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install requests

      - name: Generate METAR RSS
        env:
          CHECKWX_API_KEY: ${{ secrets.CHECKWX_API_KEY }}
        run: python generate_rss.py

      - name: Stage changes
        run: git add metar.xml

      - name: Commit if changes exist
        run: |
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "update METAR [v4]"
            git push
          fi
